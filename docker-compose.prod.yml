version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: mls_postgres
    restart: always
    environment:
      POSTGRES_DB: mls
      POSTGRES_USER: mls_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mls_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mls_user -d mls"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: mls_backend
    restart: always
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5009
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=mls;Username=mls_user;Password=${DB_PASSWORD}"
      Cors__AllowedOrigins__0: "http://103.20.97.97"
      Cors__AllowedOrigins__1: "http://localhost:3000"
      Storage__RootPath: "/opt/mls/media"
      Jwt__Secret: "${JWT_SECRET}"
      Jwt__Issuer: "mls-api"
      Jwt__Audience: "mls-clients"
      Jwt__AccessTokenExpiryMinutes: "15"
      Jwt__RefreshTokenExpiryDays: "30"
      VNPay__TmnCode: "${VNPAY_TMN_CODE:-ZQWDFZI9}"
      VNPay__HashSecret: "${VNPAY_HASH_SECRET:-WYJ7DXC2HTHWJKRJAW3ESRR36NLS7F6P}"
      VNPay__PayUrl: "https://sandbox.vnpayment.vn/paymentv2/vpcpay.html"
      VNPay__BaseUrl: "http://103.20.97.97"
      Frontend__BaseUrl: "http://103.20.97.97"
      Shipping__Username: "${SHIPPING_USERNAME:-}"
      Shipping__Password: "${SHIPPING_PASSWORD:-}"
      Shipping__ApiToken: "${SHIPPING_API_TOKEN:-}"
      Shipping__BaseUrl: "https://partner.viettelpost.vn/v2"
      Shipping__WebhookSecret: "${SHIPPING_WEBHOOK_SECRET:-}"
      Shipping__DefaultServiceCode: "LCOD"
      Shipping__SenderProvinceCode: "HCM"
      Shipping__SenderDistrictCode: "001"
      Shipping__SenderName: "MLS Platform"
      Shipping__SenderPhone: "0900000000"
      Shipping__SenderAddress: "123 Nguyen Hue, Q1, TP.HCM"
    volumes:
      - /opt/mls/media:/opt/mls/media
    ports:
      - "127.0.0.1:5009:5009"
    networks:
      - mls_internal
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://103.20.97.97
    container_name: mls_frontend
    restart: always
    environment:
      NODE_ENV: production
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - mls_internal
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: mls_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - letsencrypt:/etc/letsencrypt
      - /opt/mls/media:/opt/mls/media:ro
    networks:
      - mls_internal
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  letsencrypt:

networks:
  mls_internal:
    driver: bridge
